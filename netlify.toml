# ============================================================
#  Netlify · LP Dr. Marcelo Marciano
#  O conteudo desta pasta (site/) e a raiz publicada.
# ============================================================
[build]
  publish = "."

# Seguranca para todas as rotas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Assets com hash de conteudo: cache longo e imutavel
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# config.js muda quando o Nathan edita: nao cachear
[[headers]]
  for = "/js/config.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
